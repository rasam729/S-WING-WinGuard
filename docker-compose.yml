

services:
  mongodb:
    image: mongo:7.0
    container_name: winguard-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./shared/mockData.json:/docker-entrypoint-initdb.d/mockData.json
    environment:
      MONGO_INITDB_DATABASE: winguard
    networks:
      - winguard-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: winguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: winguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - winguard-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: winguard-server
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: winguard
      JWT_SECRET: super-secret-change-in-prod
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    depends_on:
      - mongodb
      - postgres
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - winguard-network
    restart: unless-stopped

  citizen-app:
    build:
      context: ./apps/citizen-app
      dockerfile: Dockerfile
    container_name: winguard-citizen-app
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    networks:
      - winguard-network
    restart: unless-stopped

  official-dashboard:
    build:
      context: ./apps/official-dashboard
      dockerfile: Dockerfile
    container_name: winguard-official-dashboard
    ports:
      - "5174:80"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    networks:
      - winguard-network
    restart: unless-stopped

volumes:
  mongodb_data:
  postgres_data:

networks:
  winguard-network:
    driver: bridge
