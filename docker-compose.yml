version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: winguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: winguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql/init-cloud-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/sql/global-sample-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - winguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: winguard-server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: winguard
      DB_SSL: "false"
      JWT_SECRET: change-this-to-a-long-random-secret-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - winguard-network
    restart: unless-stopped

  citizen-app:
    build:
      context: ./apps/citizen-app
      dockerfile: Dockerfile
    container_name: winguard-citizen-app
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - winguard-network
    restart: unless-stopped

  official-dashboard:
    build:
      context: ./apps/official-dashboard
      dockerfile: Dockerfile
    container_name: winguard-official-dashboard
    ports:
      - "5174:80"
    depends_on:
      - server
    networks:
      - winguard-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  winguard-network:
    driver: bridge
